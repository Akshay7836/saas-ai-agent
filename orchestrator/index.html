<!DOCTYPE html>
<html>
<head>
<title>AI DevOps Agent</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:40px}
input,button{padding:10px;margin:5px}
#log{margin-top:20px;background:#111;padding:15px;border-radius:8px}
</style>
</head>

<body>

<h2>🤖 DevOps AI Agent</h2>

<input id="repo" placeholder="username/repository">
<button onclick="scan()">Scan Repo</button>

<div id="log"></div>

<button id="fixBtn" onclick="applyFix()" style="display:none">
Generate Fix PR
</button>

<script>

let installation_id = new URLSearchParams(window.location.search).get("installation_id")
let targetFile = null

async function scan(){

let repo=document.getElementById("repo").value

document.getElementById("log").innerHTML="Scanning repository..."

const res=await fetch("/scan",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({repo,installation_id})
})

const data=await res.json()

targetFile=data.target_file

document.getElementById("log").innerHTML=`
Target File: ${data.target_file}<br>
Reason: ${data.reason}<br>
Action: ${data.action}
`

document.getElementById("fixBtn").style.display="block"

}

async function applyFix(){

let repo=document.getElementById("repo").value

document.getElementById("log").innerHTML="Applying fix..."

const res=await fetch("/apply-fix",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
repo,
installation_id,
target_file:targetFile
})
})

const data=await res.json()

document.getElementById("log").innerHTML=`
Fix Created:<br>
<a href="${data.pr_url}" target="_blank">${data.pr_url}</a>
`

}

</script>

</body>
</html>
