<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SRE Minion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; padding: 50px; }
        .card { background: #1e293b; border: none; border-radius: 15px; }
        .form-control { background: #0f172a; color: white; border: 1px solid #334155; }
        .form-control:focus { background: #0f172a; color: white; box-shadow: none; border-color: #3b82f6; }
        #log { background: #020617; padding: 15px; border-radius: 8px; font-family: monospace; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 550px;">
        <div class="card p-4 shadow-lg text-center">
            <h2 class="mb-4">🤖 DevOps AI Agent</h2>
            <button class="btn btn-primary w-100 mb-3" onclick="location.href='https://github.com/apps/devops-ai-agent/installations/new'">1. Connect GitHub</button>
            
            <div class="input-group mb-3">
                <span class="input-group-text bg-secondary text-white border-0">github.com/</span>
                <input id="repo" class="form-control" placeholder="username/repo">
            </div>

            <button id="scanBtn" class="btn btn-success w-100 mb-3" onclick="scan()">2. Deep Scan</button>
            <div id="log" class="d-none mb-3">Waiting for scan...</div>
            <button id="fixBtn" class="btn btn-warning w-100 d-none" onclick="applyFix()">3. Deploy Autonomous Fix</button>
        </div>
    </div>

    <script>
        let targetFile = null;
        const instId = new URLSearchParams(window.location.search).get("installation_id") || localStorage.getItem("inst_id");
        if(instId) localStorage.setItem("inst_id", instId);

        async function scan() {
            const repo = document.getElementById("repo").value;
            const log = document.getElementById("log");
            log.classList.remove('d-none');
            log.innerText = "Analyzing repository structure...";

            const res = await fetch("/scan", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ repo, installation_id: instId })
            });
            const data = await res.json();
            targetFile = data.target_file;
            log.innerHTML = `<b>Target:</b> ${data.target_file}<br><b>Reason:</b> ${data.reason}`;
            document.getElementById("fixBtn").classList.remove('d-none');
        }

        async function applyFix() {
            const repo = document.getElementById("repo").value;
            const fixBtn = document.getElementById("fixBtn");
            fixBtn.disabled = true;
            fixBtn.innerText = "Generating Pull Request...";

            const res = await fetch("/apply-fix", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ repo, installation_id: instId, target_file: targetFile })
            });
            const data = await res.json();
            document.getElementById("log").innerHTML = `🎉 PR Created: <a href="${data.pr_url}" target="_blank" class="text-info">Click here to view</a>`;
        }
    </script>
</body>
</html>
