<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minion SRE Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; padding: 50px; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .form-control { background: #0f172a; color: white; border: 1px solid #334155; }
        #log { background: #020617; padding: 15px; border-radius: 8px; font-family: 'Fira Code', monospace; border-left: 4px solid #6366f1; font-size: 0.85rem; }
        .btn-primary { background: #6366f1; border: none; }
        .btn-primary:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 550px;">
        <div class="card p-4 text-center">
            <h2 class="mb-4">🛡️ Minion SRE</h2>
            
            <div id="step-connect">
                <p class="text-muted">Link your GitHub to begin automated SRE fixes.</p>
                <button class="btn btn-primary btn-lg w-100" onclick="connect()">Connect GitHub Account</button>
            </div>

            <div id="step-actions" class="d-none">
                <div class="input-group mb-3">
                    <span class="input-group-text bg-dark text-white border-0">github.com/</span>
                    <input id="repo" class="form-control" placeholder="username/repository">
                </div>
                <button id="scanBtn" class="btn btn-success w-100 mb-3" onclick="scan()">Deep Scan Repository</button>
                <div id="log" class="d-none mb-3 text-start"></div>
                <button id="fixBtn" class="btn btn-warning w-100 d-none" onclick="applyFix()">Generate & Push Fix PR</button>
            </div>
        </div>
    </div>

    <script>
        let targetFile = null;
        let isProcessing = false;
        const params = new URLSearchParams(window.location.search);
        const installId = params.get("installation_id") || localStorage.getItem("gh_id");

        if(installId) {
            localStorage.setItem("gh_id", installId);
            document.getElementById("step-connect").classList.add("d-none");
            document.getElementById("step-actions").classList.remove("d-none");
        }

        function connect() {
            window.location.href = "https://github.com/apps/devopsai-agent/installations/new";
        }

        async function scan() {
            if(isProcessing) return;
            const repo = document.getElementById("repo").value.trim();
            if(!repo.includes('/')) return alert("Use format: owner/repo");

            const log = document.getElementById("log");
            const btn = document.getElementById("scanBtn");
            
            isProcessing = true;
            btn.disabled = true;
            log.classList.remove('d-none');
            log.innerHTML = "🔍 Scanning trees... AI is analyzing code...";

            try {
                const res = await fetch("/scan", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ repo, installation_id: installId })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                targetFile = data.target_file;
                log.innerHTML = `🎯 <b>Target:</b> ${data.target_file}<br>⚠️ <b>Issue:</b> ${data.reason}<br>🛠️ <b>Action:</b> ${data.action}`;
                document.getElementById("fixBtn").classList.remove('d-none');
            } catch (e) {
                log.innerHTML = `<span class="text-danger">❌ Scan Failed: ${e.message}</span>`;
            } finally {
                isProcessing = false;
                btn.disabled = false;
            }
        }

        async function applyFix() {
            if(isProcessing || !targetFile) return;
            const fixBtn = document.getElementById("fixBtn");
            const log = document.getElementById("log");
            
            isProcessing = true;
            fixBtn.disabled = true;
            fixBtn.innerText = "Generating Fix & Raising PR...";

            try {
                const res = await fetch("/apply-fix", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ repo: document.getElementById("repo").value, installation_id: installId, target_file: targetFile })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                log.innerHTML += `<br><br>🚀 <b>Success!</b> PR raised at:<br><a href="${data.pr_url}" target="_blank" class="text-info">${data.pr_url}</a>`;
                fixBtn.classList.add("d-none");
            } catch (e) {
                alert("Fix Failed: " + e.message);
                fixBtn.disabled = false;
                fixBtn.innerText = "Retry Generate Fix PR";
            } finally {
                isProcessing = false;
            }
        }
    </script>
</body>
</html>
