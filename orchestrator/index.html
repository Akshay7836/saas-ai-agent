<div class="card p-4 mb-4">
    <h3>1. Setup Access</h3>
    <a href="https://github.com/apps/devopsai-agent/installations/new" target="_blank" class="btn btn-dark">
        Install DevOpsAI on GitHub
    </a>
    <p id="status-msg" class="mt-2 text-muted">Checking installation...</p>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const installationId = urlParams.get('installation_id');
    
    if (installationId) {
        document.getElementById('status-msg').innerHTML = "✅ App Connected! ID: " + installationId;
        document.getElementById('status-msg').classList.replace('text-muted', 'text-success');
    } else {
        document.getElementById('status-msg').innerHTML = "⚠️ Please install the app first.";
    }

    // Baaki scan aur apply fix functions pehle jaise hi rahenge, 
    // bas ensure karna ki applyFix mein installationId pass ho rahi hai.
</script>
