
<div id="agent-ui" class="d-none">
    <div class="mb-3">
        <label class="form-label small fw-bold">Target Repository</label>
        <input type="text" id="repo" class="form-control" placeholder="username/repository">
    </div>
    <button id="scanBtn" onclick="run('scan')" class="btn btn-agent w-100 py-2 fw-bold mb-3">Initialize Deep Scan</button>
    
    <div id="logBox" class="p-3 mb-3 d-none border rounded bg-dark text-light small" style="white-space: pre-wrap;"></div>
    
    <button id="fixBtn" onclick="run('fix')" class="btn btn-success w-100 py-2 fw-bold d-none">Deploy Autonomous Fix</button>
    
    <div id="prResult" class="mt-3 d-none text-center">
        <div class="alert alert-success">🎉 Healing Complete! PR Raised.</div>
        <a id="prLink" target="_blank" class="btn btn-outline-dark btn-sm">Review Changes</a>
    </div>
</div>
