<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minion SRE Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
    <div class="max-w-3xl mx-auto bg-gray-800 p-8 rounded-xl shadow-2xl">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">🛠️ Minion SRE SaaS</h1>
        
        <div class="space-y-4">
            <input id="token" type="password" placeholder="GitHub Personal Access Token" class="w-full p-3 rounded bg-gray-700 border-none">
            <input id="repo" type="text" placeholder="username/repository" class="w-full p-3 rounded bg-gray-700 border-none">
            <textarea id="log" rows="6" placeholder="Paste Error Log / Stack Trace here..." class="w-full p-3 rounded bg-gray-700 border-none"></textarea>
            
            <button onclick="investigate()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded font-bold transition">
                Start Investigation
            </button>
        </div>

        <div id="result" class="mt-8 hidden p-5 border border-blue-500 rounded bg-blue-900/20">
            <h2 class="text-xl font-bold mb-2">Analysis Result:</h2>
            <p id="analysisText" class="text-gray-300 italic mb-4"></p>
            <a id="prLink" target="_blank" class="text-green-400 underline font-bold"></a>
        </div>
    </div>

    <script>
        async function investigate() {
            const btn = document.getElementById('btn');
            btn.innerText = "Investigating... 🕵️‍♂️";
            btn.disabled = true;

            const response = await fetch('http://localhost:8000/api/v1/investigate-and-fix', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-GitHub-Token': document.getElementById('token').value
                },
                body: JSON.stringify({
                    error_log: document.getElementById('log').value,
                    repo_full_name: document.getElementById('repo').value
                })
            });

            const data = await response.json();
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('analysisText').innerText = data.root_cause;
            document.getElementById('prLink').href = data.pull_request;
            document.getElementById('prLink').innerText = "View Generated Pull Request 🚀";
            
            btn.innerText = "Start Investigation";
            btn.disabled = false;
        }
    </script>
</body>
</html>
