<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRE Minion | Autonomous DevOps</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#0f172a;color:#f8fafc;font-family:'Segoe UI'}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px}
.btn-agent{background:#3b82f6;border:none;color:white}
.btn-agent:hover{background:#2563eb}
.btn-success{background:#10b981;border:none}
#log{border-left:4px solid #3b82f6;background:#020617!important}
.spinner-border{display:none;width:1.2rem;height:1.2rem;margin-right:8px}
</style>
</head>

<body class="p-5">

<div class="container mt-5" style="max-width:550px">

<div class="text-center mb-4">
<h2 class="fw-bold">🤖 Minion SRE</h2>
<p class="text-muted">Autonomous Repository Healing Agent</p>
</div>

<div class="card p-4 shadow">

<div class="mb-4">
<label class="small text-uppercase text-muted fw-bold mb-2">Step 1: Authorization</label>

<a href="https://github.com/apps/devopsai-agent/installations/new"
class="btn btn-outline-light w-100">

Link GitHub Repository

</a>
</div>

<div id="ui" class="d-none">

<label class="small text-uppercase text-muted fw-bold mb-2">Step 2: Target Repository</label>

<div class="input-group mb-3">

<span class="input-group-text">github.com/</span>

<input type="text" id="repo" class="form-control" placeholder="username/repository">

</div>

<button id="scanBtn" onclick="runScan()" class="btn btn-agent w-100 mb-3">

<span id="scanSpinner" class="spinner-border spinner-border-sm"></span>

Initialize Deep Scan

</button>

<div id="log" class="p-3 text-info small rounded mb-3 d-none"
style="font-family:monospace"></div>

<button id="fixBtn" onclick="runFix()" class="btn btn-success w-100 d-none">

<span id="fixSpinner" class="spinner-border spinner-border-sm"></span>

Deploy Autonomous Fix

</button>

<div id="final" class="mt-3 d-none alert alert-success text-center"></div>

</div>
</div>
</div>

<script>

const urlParams=new URLSearchParams(window.location.search)
const instId=urlParams.get("installation_id")

let currentTarget=""

if(instId) document.getElementById("ui").classList.remove("d-none")

async function runScan(){

const repo=document.getElementById("repo").value

if(!repo.match(/^[a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+$/)){
alert("Invalid repository format")
return
}

const log=document.getElementById("log")
const btn=document.getElementById("scanBtn")
const spinner=document.getElementById("scanSpinner")

btn.disabled=true
spinner.style.display="inline-block"

log.classList.remove("d-none")
log.innerHTML="Analyzing repository..."

try{

const res=await fetch("/scan",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({repo,installation_id:instId})
})

const data=await res.json()

currentTarget=data.target_file

log.innerHTML=

`<b>AI Analysis</b><br>
Target File: ${data.target_file}<br>
Reason: ${data.reason}<br>
Action: ${data.action}`

document.getElementById("fixBtn").classList.remove("d-none")

}catch(e){

log.innerHTML="Scan failed"

}

btn.disabled=false
spinner.style.display="none"
}

async function runFix(){

const repo=document.getElementById("repo").value
const btn=document.getElementById("fixBtn")
const spinner=document.getElementById("fixSpinner")
const final=document.getElementById("final")

btn.disabled=true
spinner.style.display="inline-block"

final.classList.remove("d-none")
final.innerText="Generating fix..."

try{

const res=await fetch("/apply-fix",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({repo,installation_id:instId,target_file:currentTarget})
})

const data=await res.json()

final.innerHTML=`Fix Complete<br><a href="${data.pr_url}" target="_blank">View Pull Request</a>`

}catch{

final.innerText="Fix failed"

}

btn.disabled=false
spinner.style.display="none"
}

</script>

</body>
</html>
