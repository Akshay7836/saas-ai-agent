<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOpsAI Minion Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .btn-agent { background: #6366f1; color: white; border-radius: 10px; transition: 0.3s; }
        .btn-agent:hover { background: #4f46e5; transform: translateY(-2px); }
        #logBox { background: #1e1e1e; color: #00ff00; font-family: monospace; border-radius: 10px; max-height: 300px; overflow-y: auto; }
        .issue-item { border-left: 4px solid #6366f1; background: #2a2a2a; margin-bottom: 10px; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body class="p-5">
    <div class="container" style="max-width: 650px;">
        <div class="card p-4">
            <h2 class="text-center fw-bold mb-4">🤖 AI DevOps Minion</h2>
            
            <div id="auth-area" class="mb-4">
                <a href="https://github.com/apps/devopsai-agent/installations/new" class="btn btn-dark w-100 py-2 fw-bold">Step 1: Link Repository</a>
            </div>

            <div id="agent-ui" class="d-none">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Target Repository</label>
                    <input type="text" id="repo" class="form-control" placeholder="username/repository">
                </div>
                <button id="scanBtn" onclick="run('scan')" class="btn btn-agent w-100 py-2 fw-bold mb-3">Initialize RAG Deep Scan</button>
                
                <div id="logBox" class="p-3 mb-3 d-none small" style="white-space: pre-wrap;"></div>
                
                <div id="fix-actions" class="d-none">
                    <p class="small fw-bold text-muted">AI identified multiple issues. Deploying fix for the primary target...</p>
                    <button id="fixBtn" onclick="run('fix')" class="btn btn-success w-100 py-2 fw-bold mb-3">Deploy Autonomous Fix</button>
                </div>
                
                <div id="prResult" class="mt-3 d-none text-center">
                    <div class="alert alert-success">🎉 Healing Complete! Pull Request Raised.</div>
                    <a id="prLink" target="_blank" class="btn btn-outline-dark btn-sm">Review Changes on GitHub</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const instId = params.get('installation_id');
        let detectedIssues = []; // Store issues from scan

        if(instId) document.getElementById('agent-ui').classList.remove('d-none');

        async function run(mode) {
            const repo = document.getElementById('repo').value;
            const btn = mode === 'scan' ? document.getElementById('scanBtn') : document.getElementById('fixBtn');
            const log = document.getElementById('logBox');
            
            if(!repo) return alert("Please enter a repository name!");

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> AI is working...`;
            log.classList.remove('d-none');
            
            if(mode === 'scan') {
                log.innerText = ">> Cloning Repo & Generating Vector Embeddings...\n>> Performing Semantic Search (RAG)...\n>> Analyzing connections...";
            } else {
                log.innerText = `>> Patching ${detectedIssues[0]?.target_file}...\n>> Pushing to GitHub...`;
            }

            try {
                const payload = { repo, installation_id: instId };
                
                // If fixing, tell the server WHICH file to fix from our detected list
                if(mode === 'fix' && detectedIssues.length > 0) {
                    payload.target_file = detectedIssues[0].target_file;
                }

                const res = await fetch(mode === 'scan' ? '/scan' : '/apply-fix', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if(mode === 'scan') {
                    detectedIssues = data.issues || [];
                    log.innerText = data.explanation;
                    document.getElementById('fix-actions').classList.remove('d-none');
                } else {
                    document.getElementById('prResult').classList.remove('d-none');
                    document.getElementById('prLink').href = data.pr_url;
                    log.innerText += "\n\n>> Success! PR created.";
                }
            } catch(e) { 
                alert("Agent encountered an error! Check server logs."); 
            }
            
            btn.disabled = false;
            btn.innerText = mode === 'scan' ? "Initialize RAG Deep Scan" : "Deploy Autonomous Fix";
        }
    </script>
</body>
</html>
