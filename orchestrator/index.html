<!DOCTYPE html>
<html>
<head>
<title>AI DevOps Agent</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:650px;
margin:auto;
background:#111827;
padding:30px;
border-radius:10px;
}

input{
padding:10px;
width:70%;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.connect{background:#6366f1;color:white}
.scan{background:#22c55e;color:white}
.fix{background:#f59e0b;color:white}

#log{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:8px;
text-align:left;
}

</style>
</head>

<body>

<div class="container">

<h2>🤖 DevOps AI Agent</h2>

<button class="connect" onclick="connectGithub()">Connect GitHub</button>

<br>

<input id="repo" placeholder="owner/repository">

<br>

<button class="scan" onclick="scan()">Scan Repo</button>

<div id="log">Waiting...</div>

<button id="fixBtn" class="fix" onclick="applyFix()" style="display:none">
Generate Fix PR
</button>

</div>

<script>

let targetFile=null

const params=new URLSearchParams(window.location.search)
const install=params.get("installation_id")

if(install){
localStorage.setItem("installation_id",install)
}

function getInstallation(){
return localStorage.getItem("installation_id")
}

function connectGithub(){

window.location.href="https://github.com/apps/devops-ai-agent/installations/new"

}

async function scan(){

const repo=document.getElementById("repo").value
const installation_id=getInstallation()

document.getElementById("log").innerHTML="Scanning repository..."

const res=await fetch("/scan",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({repo,installation_id})
})

const data=await res.json()

targetFile=data.target_file

document.getElementById("log").innerHTML=`
Target File: ${data.target_file}<br><br>
Reason: ${data.reason}<br><br>
Action: ${data.action}
`

document.getElementById("fixBtn").style.display="inline-block"

}

async function applyFix(){

const repo=document.getElementById("repo").value
const installation_id=getInstallation()

document.getElementById("log").innerHTML="Creating PR..."

const res=await fetch("/apply-fix",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
repo,
installation_id,
target_file:targetFile
})
})

const data=await res.json()

document.getElementById("log").innerHTML=`
PR Created:<br>
<a href="${data.pr_url}" target="_blank">${data.pr_url}</a>
`

}

</script>

</body>
</html>
